<!DOCTYPE html>
	<html lang="en" xmlns:th="http://www.thymeleaf.org">

	<head>
		<title>ThymeLeafDemo</title>
	</head>

	<body>

		<div class="container">
			<h1>Employee Directory</h1>
			<a th:href="@{/employees/showFormForAdd}" class="btn btn-primary">Add Emplo</a>

			<hr>
			<table>
				<thead>
					<tr>
						<th>First name</th>
						<th>Last Name</th>
						<th>Email</th>
						<th colspan="2">Action</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="tempEmployee : ${employees}">
						<td th:text="${tempEmployee.firstName}"></td>
						<td th:text="${tempEmployee.lastName}"></td>
						<td th:text="${tempEmployee.email}"></td>
					</tr>

					<td>
						<a href="@{/employess/showFormForUpdate(employeeId=${tempEmployee.id})}"
							class="btn btn-info btn-sm">Update</a>
					</td>

					<td>
						<a href="@{/employess/deleteEmployee(employeeId=${tempEmployee.id})}"
							class="btn btn-info btn-sm">Delete</a>
					</td>

				</tbody>
				</table>
		</div>
	</body>

	</html>
