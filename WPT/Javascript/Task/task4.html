<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Toggle</title>
</head>

<style>
    .container{
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center; 
        align-items: center;
        background-color: beige;
    }
    .box{
        margin-top: 10px;
        /* background-color: burlywood; */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    #changeImg{
        height: 300px;
        width: 350px;
    }
</style>
<body>
    <div class="container">
        <div class="box">
            <img src="./imges/Idli.jpg" alt="" id="changeImg">
            <div id="btn" onclick="toggle()"><button>Toggle Image</button></div>
        </div>
        
    </div>

    <script>
            let allImages = ["./imges/Idli.jpg", "./imges/kachori.jpg","./imges/somosa.jpg"];
            let index = 0;

        function toggle()
        {
            index = (index + 1) % allImages.length;
            document.getElementById("changeImg").src = allImages[index];
        }
    </script>
</body>
</html>
