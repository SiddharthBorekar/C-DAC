<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="dashboard.js"></script>
</head>

<body class="bg-dark text-light">

<div class="container py-5">

  <!-- Title -->
  <h1 class="text-center mb-4 text-info">Employee Dashboard</h1>

  <!-- Load Button -->
  <div class="text-center mb-4">
    <button class="btn btn-info px-4" onclick="getData()">Load Data</button>
  </div>

  <!-- Table -->
  <div class="card shadow-lg mb-5">
    <div class="card-header bg-secondary text-white">
      Employee Records
    </div>
    <div class="card-body table-responsive">
      <table class="table table-dark table-hover text-center align-middle">
        <thead class="table-info text-dark">
          <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>ROLE</th>
            <th>SALARY</th>
            <th>DEPARTMENT</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>

  <!-- Forms Row -->
  <div class="row g-4">

    <!-- ADD -->
    <div class="col-md-4">
      <div class="card h-100 shadow">
        <div class="card-header bg-success text-white">Add Employee</div>
        <div class="card-body">
          <input class="form-control mb-2" id="name" placeholder="Name">
          <input class="form-control mb-2" id="role" placeholder="Role">
          <input class="form-control mb-2" id="salary" placeholder="Salary">
          <input class="form-control mb-3" id="dept" placeholder="Department">
          <button class="btn btn-success w-100" onclick="addRecord()">Add</button>
        </div>
      </div>
    </div>

    <!-- UPDATE -->
    <div class="col-md-4">
      <div class="card h-100 shadow">
        <div class="card-header bg-warning text-dark">Update Employee</div>
        <div class="card-body">
          <input class="form-control mb-2" id="uid_update" placeholder="ID">
          <input class="form-control mb-2" id="name_update" placeholder="Name">
          <input class="form-control mb-2" id="role_update" placeholder="Role">
          <input class="form-control mb-2" id="salary_update" placeholder="Salary">
          <input class="form-control mb-3" id="dept_update" placeholder="Department">
          <button class="btn btn-warning w-100" onclick="updateRecord()">Update</button>
        </div>
      </div>
    </div>

    <!-- DELETE -->
    <div class="col-md-4">
      <div class="card h-100 shadow">
        <div class="card-header bg-danger text-white">Delete Employee</div>
        <div class="card-body">
          <input class="form-control mb-3" id="uid" placeholder="Enter ID">
          <button class="btn btn-danger w-100" onclick="deleteRecord()">Delete</button>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
